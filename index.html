<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌳 Trombo Karo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="uis-gara-bg">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Memuat Trombo Karo...</p>
  </div>

  <header class="header">
    <h1>🌳 Trombo Karo</h1>
    <p>Silsilah Keluarga Karo</p>
  </header>

  <nav class="nav">
    <button onclick="showPage('home')">🏠</button>
    <button onclick="showPage('input')">📝</button>
    <button onclick="showPage('cari')">🔍</button>
  </nav>

  <main class="container">
    <!-- HOME -->
    <section id="page-home" class="page active">
      <div class="hero">
        <h2>Mejuah-juah! 🙏</h2>
        <p>Temukan Rakut Sitelu & Tutur Siwaluh</p>
        <button class="btn-primary" onclick="showPage('input')">➕ Input Data</button>
      </div>
      <div class="stat">
        <span id="totalKeluarga">0</span> Keluarga Terdaftar
      </div>
    </section>

    <!-- INPUT -->
    <section id="page-input" class="page">
      <form id="formInput" class="form">
        <fieldset>
          <legend>📷 Foto</legend>
          <div class="photo-preview" id="photoPreview" onclick="document.getElementById('fotoInput').click()">
            <span>📷</span><small>Klik untuk foto</small>
          </div>
          <input type="file" id="fotoInput" accept="image/*" capture="camera" hidden>
        </fieldset>

        <fieldset>
          <legend>👤 Data Diri</legend>
          <div class="row">
            <div class="field">
              <label>Nama *</label>
              <input type="text" id="nama" required>
            </div>
            <div class="field">
              <label>Marga *</label>
              <select id="marga" required>
                <option value="">Pilih</option>
                <option value="Ginting">Ginting</option>
                <option value="Karo-Karo">Karo-Karo</option>
                <option value="Perangin-angin">Perangin-angin</option>
                <option value="Sembiring">Sembiring</option>
                <option value="Tarigan">Tarigan</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label>Bapa *</label>
              <input type="text" id="bapa" required>
            </div>
            <div class="field">
              <label>Nande *</label>
              <input type="text" id="nande" required>
            </div>
          </div>
          <div class="field" id="beruGroup" style="display:none">
            <label>Beru (perempuan)</label>
            <input type="text" id="beru">
          </div>
          <div class="field">
            <label>Senina</label>
            <div id="seninaContainer"></div>
            <button type="button" class="btn-add" onclick="tambahSenina()">+ Tambah</button>
          </div>
        </fieldset>

        <fieldset>
          <legend>💑 Ndehara</legend>
          <div class="row">
            <div class="field">
              <label>Nama</label>
              <input type="text" id="ndeharaNama">
            </div>
            <div class="field">
              <label>Marga</label>
              <select id="margaNdehara">
                <option value="">Pilih</option>
                <option value="Ginting">Ginting</option>
                <option value="Karo-Karo">Karo-Karo</option>
                <option value="Perangin-angin">Perangin-angin</option>
                <option value="Sembiring">Sembiring</option>
                <option value="Tarigan">Tarigan</option>
              </select>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>👶 Anak</legend>
          <div id="anakContainer"></div>
          <button type="button" class="btn-add" onclick="tambahAnak()">+ Tambah Anak</button>
        </fieldset>

        <fieldset>
          <legend>📞 Kontak</legend>
          <div class="field">
            <label>Alamat</label>
            <textarea id="alamat" rows="2"></textarea>
          </div>
          <div class="field">
            <label>WhatsApp</label>
            <input type="tel" id="nowa" placeholder="0812...">
          </div>
        </fieldset>

        <div class="actions">
          <button type="button" class="btn-outline" onclick="resetForm()">🔄 Reset</button>
          <button type="submit" class="btn-primary" id="btnSubmit">💾 Simpan</button>
        </div>
      </form>
    </section>

    <!-- CARI -->
    <section id="page-cari" class="page">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari nama, marga...">
        <button onclick="cariKeluarga()">🔍</button>
      </div>
      <div id="searchResults"></div>
    </section>
  </main>

  <div id="toast" class="toast"><span id="toastMsg"></span></div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
